<svg width="680" viewBox="0 0 680 466" role="img" xmlns="http://www.w3.org/2000/svg">
<title>JSONL source of truth by role, with demo versus production overlay</title>
<desc>Three-band clinical data pipeline. Band one, source of truth (immutable, append-only) where JSONL/NDJSON is authoritative: raw NDJSON landing zone, code and config pinned at a git SHA, and an append-only access or audit log. A deterministic rebuild arrow flows to band two, reproducible derivations: the intermediate .jsonl stage files, regenerable and never authoritative. A load or publish arrow flows to band three, query and serve (not JSONL): a Parquet analytics store read via duckdb, and model serving. A coral dot marks boxes that are new relative to the two prior demo repos, neither of which had these; boxes without a dot already exist in the demo pipeline.</desc>
<rect x="0" y="0" width="680" height="466" rx="12" fill="#ffffff"/>
<g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">

<text x="40" y="52" font-size="14" font-weight="500" fill="#111827">source of truth — immutable, append-only</text>
<rect x="40" y="64" width="185" height="64" rx="8" fill="#d8f0ec" stroke="#0f766e"/>
<text x="133" y="92" font-size="14" font-weight="500" fill="#0f5c56" text-anchor="middle">raw landing zone</text>
<text x="133" y="110" font-size="12" fill="#0f766e" text-anchor="middle">from FHIR $export</text>
<circle cx="217" cy="74" r="5" fill="#db6a54"/>
<rect x="245" y="64" width="170" height="64" rx="8" fill="#d8f0ec" stroke="#0f766e"/>
<text x="330" y="92" font-size="14" font-weight="500" fill="#0f5c56" text-anchor="middle">code + config</text>
<text x="330" y="110" font-size="12" fill="#0f766e" text-anchor="middle">pinned at git SHA</text>
<rect x="435" y="64" width="205" height="64" rx="8" fill="#d8f0ec" stroke="#0f766e"/>
<text x="538" y="92" font-size="14" font-weight="500" fill="#0f5c56" text-anchor="middle">access / audit log</text>
<text x="538" y="110" font-size="12" fill="#0f766e" text-anchor="middle">append-only JSONL</text>
<circle cx="632" cy="74" r="5" fill="#db6a54"/>

<line x1="340" y1="134" x2="340" y2="160" stroke="#6b7280" stroke-width="1.5"/>
<path d="M336 154L340 160L344 154" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<text x="350" y="152" font-size="12" fill="#4b5563">deterministic rebuild</text>

<text x="40" y="180" font-size="14" font-weight="500" fill="#111827">reproducible derivation — regenerable</text>
<rect x="40" y="190" width="600" height="74" rx="8" fill="#fbeecb" stroke="#b45309" stroke-dasharray="7 4"/>
<text x="60" y="214" font-size="14" font-weight="500" fill="#8a4b08">intermediate .jsonl files</text>
<text x="60" y="234" font-size="12" fill="#92510a">extract · normalize · redact · rebalance · synthesize · split · format</text>
<text x="60" y="253" font-size="12" fill="#92510a">already in the demo — and already treated as regenerable, not authoritative</text>

<line x1="340" y1="270" x2="340" y2="296" stroke="#6b7280" stroke-width="1.5"/>
<path d="M336 290L340 296L344 290" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<text x="350" y="288" font-size="12" fill="#4b5563">load / publish</text>

<text x="40" y="316" font-size="14" font-weight="500" fill="#111827">query / serve — not jsonl</text>
<rect x="40" y="326" width="290" height="64" rx="8" fill="#dbe7fe" stroke="#1d4ed8"/>
<text x="185" y="354" font-size="14" font-weight="500" fill="#1e40af" text-anchor="middle">analytics store</text>
<text x="185" y="372" font-size="12" fill="#1d4ed8" text-anchor="middle">Parquet, read via duckdb</text>
<circle cx="322" cy="336" r="5" fill="#db6a54"/>
<rect x="350" y="326" width="290" height="64" rx="8" fill="#dbe7fe" stroke="#1d4ed8"/>
<text x="495" y="354" font-size="14" font-weight="500" fill="#1e40af" text-anchor="middle">model serving</text>
<text x="495" y="372" font-size="12" fill="#1d4ed8" text-anchor="middle">registry + monitoring</text>
<circle cx="632" cy="336" r="5" fill="#db6a54"/>

<rect x="40" y="410" width="16" height="16" rx="4" fill="#d8f0ec" stroke="#0f766e"/>
<text x="62" y="422" font-size="12" fill="#4b5563">source of truth</text>
<rect x="240" y="410" width="16" height="16" rx="4" fill="#fbeecb" stroke="#b45309" stroke-dasharray="4 3"/>
<text x="262" y="422" font-size="12" fill="#4b5563">regenerable transport</text>
<rect x="470" y="410" width="16" height="16" rx="4" fill="#dbe7fe" stroke="#1d4ed8"/>
<text x="492" y="422" font-size="12" fill="#4b5563">table format</text>
<circle cx="48" cy="444" r="5" fill="#db6a54"/>
<text x="62" y="448" font-size="12" fill="#4b5563">new vs. the two prior repos  ·  no marker = already in the demo</text>
</g>
</svg>
